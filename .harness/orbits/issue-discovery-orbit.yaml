package:
    type: orbit
    name: issue-discovery-orbit
description: issue-discovery-orbit orbit
meta:
    file: .harness/orbits/issue-discovery-orbit.yaml
    agents_template: |
        # Issue Discovery Workflow

        Issue Discovery Workflow 用于在需要时把想法、PRD 或计划切成 issue tracker 中可追踪的工作。

        ## 按需读取

        - 生成 PRD、把计划切成 issues、或准备发布 issue candidates 时，先读 `docs/issue-discovery-orbit/discovery-rules.md`。
        - 使用 `to-prd` 或 `to-issues` skill 时，由 skill 承担具体流程，并按 discovery rules 处理发布条件。
        - 发布 PRD 或 issues 前，读取目标仓库的 Repository Publishing Rules；规则缺失或冲突时，只输出 candidates，不发布。

        ## 常驻边界

        - 不要假设 issue tracker、模板、labels、状态入口或权限已经明确。
        - 不要把未确认的候选 PRD 或 issue 当作已经发布的 tracker truth。
    humans_template: |
        # HUMANS.md - Issue Discovery Orbit

        这个 orbit 给想把想法、PRD 或计划整理成 issue tracker 工作项的人使用。

        可用 skill：

        - `to-prd`
        - `to-issues`

        发布前确认目标仓库的 Repository Publishing Rules：issue tracker、模板、labels、状态入口和权限。
        规则明确时可以发布；规则缺失或冲突时，只生成 candidates 供确认。
    include_in_projection: true
    include_in_write: true
    include_in_export: true
    include_description_in_orchestration: true
capabilities:
    commands:
        paths:
            include:
                - commands/issue-discovery-orbit/**/*.md
    skills:
        local:
            paths:
                include:
                    - skills/issue-discovery-orbit/*
content:
    - name: issue-discovery-rules
      role: rule
      paths:
        include:
            - docs/issue-discovery-orbit/**
behavior:
    scope:
        projection_roles:
            - meta
            - subject
            - rule
            - process
        write_roles:
            - meta
            - rule
        export_roles:
            - meta
            - rule
        orchestration_roles:
            - meta
            - rule
            - process
    orchestration:
        include_orbit_description: true
        materialize_agents_from_meta: true
